    <style>
        :root {
            --bg-dark: #020617;
            --card-bg: #1e293b;
            --primary: #10b981;
            --gold: #f59e0b;
            --red: #ef4444;
            --text: #f8fafc;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            padding: 10px;
        }

        .container { width: 100%; max-width: 900px; margin: 0 auto; }

        .royal-header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border: 2px solid var(--gold);
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            margin: 20px 0 40px;
        }

        .q-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border-right: 8px solid var(--primary);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .option {
            background: rgba(255, 255, 255, 0.05);
            padding: 18px;
            margin: 12px 0;
            border-radius: 15px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s;
            font-size: 1.1rem;
        }

        .option:hover { background: rgba(16, 185, 129, 0.1); border-color: var(--primary); }
        .option.correct { background: #064e3b !important; border-color: var(--primary) !important; font-weight: bold; }
        .option.wrong { background: #7f1d1d !important; border-color: var(--red) !important; }

        .msg-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 12px;
            display: none;
            font-weight: 700;
            text-align: center;
            line-height: 1.6;
        }

        .submit-all {
            width: 100%;
            padding: 25px;
            background: linear-gradient(45deg, var(--primary), #059669);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 1.8rem;
            font-weight: 900;
            cursor: pointer;
            margin: 40px 0;
        }

        #final-screen {
            display: none;
            text-align: center;
            padding: 50px;
            background: #0f172a;
            border: 4px solid var(--gold);
            border-radius: 40px;
        }
    </style>
</head>

];

// --- 100 رسالة مدح و 100 رسالة تشجيع ---
const compliments = Array.from({length: 100}, (_, i) => `إبداع لا حدود له في السؤال ${i+1}! أنت ملك الأحياء 👑`);
const encouragements = Array.from({length: 100}, (_, i) => `كبوة جواد في السؤال ${i+1}.. انهض يا بطل، القمة تنتظرك 💪`);

let score = 0;

function buildQuiz() {
    const box = document.getElementById('quiz-box');
    db.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `<div style="font-size:1.3rem; font-weight:900; margin-bottom:15px;">س${i+1}: ${item.q}</div>
        <div id="grp-${i}">
            ${item.a.map((opt, oi) => `<div class="option" onclick="checkAnswer(${i}, ${oi})">${opt}</div>`).join('')}
            <div id="msg-${i}" class="msg-box"></div>
        </div>`;
        box.appendChild(card);
    });
}

function checkAnswer(qi, oi) {
    const grp = document.getElementById(`grp-${qi}`);
    const options = grp.getElementsByClassName('option');
    const msgBox = document.getElementById(`msg-${qi}`);
    if(grp.classList.contains('done')) return;

    if(oi === db[qi].c) {
        options[oi].classList.add('correct');
        score++;
        msgBox.style.display = 'block';
        msgBox.style.backgroundColor = 'rgba(16, 185, 129, 0.2)';
        msgBox.style.color = 'var(--primary)';
        msgBox.innerText = compliments[qi];
        confetti({ particleCount: 30, spread: 50, origin: { y: 0.8 } });
    } else {
        options[oi].classList.add('wrong');
        options[db[qi].c].classList.add('correct');
        msgBox.style.display = 'block';
        msgBox.style.backgroundColor = 'rgba(245, 158, 11, 0.2)';
        msgBox.style.color = 'var(--gold)';
        msgBox.innerHTML = `${encouragements[qi]}<br><span style="color:#fff">الجواب الصحيح: ${db[qi].a[db[qi].c]}</span>`;
    }
    grp.classList.add('done');
}

function finishQuiz() {
    window.scrollTo(0,0);
    document.getElementById('quiz-box').style.display = 'none';
    document.getElementById('end-btn').style.display = 'none';
    const screen = document.getElementById('final-screen');
    screen.style.display = 'block';
    document.getElementById('score-val').innerText = `${score} / 100`;
    
    const rName = document.getElementById('rank-name');
    const rMsg = document.getElementById('rank-msg');

    if(score === 100) {
        rName.innerText = "👑 إمبراطور الفصل الثالث 👑";
        rMsg.innerText = "لقد فعلتها! 100 سؤال من نار ولم يسقط منك واحد. أنت الآن فخر السادس الإعدادي.";
        bigCelebration();
    } else if(score >= 85) {
        rName.innerText = "⚔️ جنرال الأحياء ⚔️";
        rMsg.innerText = "نتيجة مرعبة وفخمة جداً! أنت على بعد خطوة من المثالية الكاملة.";
    } else if(score >= 50) {
        rName.innerText = "🔭 الباحث المتميز 🔭";
        rMsg.innerText = "اجتزت نصف التحدي بنجاح، ركز على الأخطاء وستحطم الرقم القياسي المرة القادمة.";
    } else {
        rName.innerText = "🕯️ شعلة الأمل 🕯️";
        rMsg.innerText = "هذا الاختبار كشف لك نقاط ضعفك، عُد للملزمة بقوة وستنتصر حتماً.";
    }
}

function bigCelebration() {
    var end = Date.now() + 5000;
    (function frame() {
        confetti({ particleCount: 10, angle: 60, spread: 55, origin: { x: 0 } });
        confetti({ particleCount: 10, angle: 120, spread: 55, origin: { x: 1 } });
        if (Date.now() < end) requestAnimationFrame(frame);
    }());
}

window.onload = buildQuiz;
</script>
</body>
</html>
